# Prefer a Node Web Service — most reliable on Render for this Vite SPA.
# (HashRouter means deep links work even without CDN rewrite rules.)
services:
  - type: web
    name: api-health-monitoring
    runtime: node
    plan: free
    repo: https://github.com/amangarg104/API-health-Monitoring.git
    branch: main
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "20"
